<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portfolio | Coming Soon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <canvas id="neuralCanvas"></canvas>

    <div class="glass-card">
        <div class="card-header">
            <div class="status-pill">
                <span class="pulse-ring"></span>
                <span class="status-text">SYSTEM: OPTIMIZING_PORTFOLIO</span>
            </div>
        </div>

        <main class="card-body">
            <h1 class="glitch" data-text="HELLO, I'm Assadullah">HELLO, I'm Assadullah</h1>
            <!-- <h1 class="hero-title">HELLO, <span class="gradient-text">I'm Assadullah</span></h1> -->
            <p class="hero-subtitle">I'm currently rewriting my digital footprint. Crafting clean code, scalable architecture, and pixel-perfect interfaces.</p>
            
            <div class="countdown-container">
                <div class="countdown-box">
                    <span class="time-num" id="days">00</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="countdown-box">
                    <span class="time-num" id="hours">00</span>
                    <span class="time-label">Hours</span>
                </div>
                <div class="countdown-box">
                    <span class="time-num" id="minutes">00</span>
                    <span class="time-label">Mins</span>
                </div>
                <div class="countdown-box">
                    <span class="time-num" id="seconds">00</span>
                    <span class="time-label">Secs</span>
                </div>
            </div>

            <div class="progress-wrapper">
                <div class="progress-meta">
                    <span class="progress-title"><i class="fa-solid fa-code-branch"></i> main branch deployment</span>
                    <span class="progress-percent">88%</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill"></div>
                </div>
            </div>
        </main>

        <footer class="card-footer">
            <p class="footer-hint">Let's connect in the meantime:</p>
            <div class="social-grid">
                <a href="ttps://github.com/assadullahhassan/" class="social-icon" aria-label="GitHub"><i class="fab fa-github"></i></a>
                <a href="https://www.linkedin.com/in/assadullahhassan/" class="social-icon" aria-label="LinkedIn"><i class="fab fa-linkedin"></i></a>
                <a href="https://x.com/lexama_pro" class="social-icon" aria-label="Twitter"><i class="fa-brands fa-square-twitter"></i></a>
                <a href="mailto:assadullahhassan@gmail.com" class="social-icon" aria-label="Email"><i class="fa-solid fa-envelope"></i></a>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
